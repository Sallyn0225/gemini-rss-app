name = "gemini-rss-app"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# ─── D1 Database ───
[[d1_databases]]
binding = "DB"
database_name = "gemini-rss-db"
database_id = "14e4a542-8c88-4295-9b6f-ab67d56842a2"
migrations_dir = "drizzle/d1-migrations"

# ─── KV Namespace (rate limiting) ───
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "3c348ef141d24372b22961fa409b09a0"

# ─── Secrets (set via `wrangler pages secret put`) ───
# ADMIN_SECRET
# DATABASE_URL  (optional, Neon PG fallback)
